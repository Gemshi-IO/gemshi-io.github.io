<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Terms of Use | Gemshi's Apps</title>
  <meta name="description" content="Terms of Use for Gemshi apps.">
  <meta name="theme-color" content="#000000">
  <link rel="icon" type="image/png" href="images/GemshiLogo.png">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0750K9G1T6"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-0750K9G1T6');
  </script>
  <style>
    :root {
      --bg: #000;
      --panel: #111;
      --text: #fff;
      --text-dim: #86868b;
      --stroke: rgba(255,255,255,0.1);
      --btn: rgba(255,255,255,0.08);
      --btn-hover: rgba(255,255,255,0.14);
    }
    [data-theme="light"] {
      --bg: #f5f5f7;
      --panel: #fff;
      --text: #1d1d1f;
      --text-dim: #6e6e73;
      --stroke: rgba(0,0,0,0.12);
      --btn: rgba(0,0,0,0.05);
      --btn-hover: rgba(0,0,0,0.1);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap { max-width: 860px; margin: 0 auto; padding: 28px 18px 56px; }
    .top { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 24px; }
    .back, .btn, .theme-toggle {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      min-height: 42px; padding: 0 14px; border-radius: 999px;
      border: 1px solid var(--stroke); background: var(--btn); color: var(--text); text-decoration: none;
      font-size: 0.92rem; font-weight: 600;
    }
    .back:hover, .btn:hover, .theme-toggle:hover { background: var(--btn-hover); }
    .card {
      background: var(--panel);
      border: 1px solid var(--stroke);
      border-radius: 20px;
      padding: 24px;
    }
    h1 { margin: 0 0 10px; font-size: clamp(1.6rem, 4vw, 2.5rem); }
    p { margin: 0 0 14px; color: var(--text-dim); line-height: 1.6; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="back" href="index.html">Back to Apps</a>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle color theme">
        <span id="theme-icon" aria-hidden="true">☾</span>
        <span id="theme-text">Dark</span>
      </button>
    </div>
    <section class="card">
      <h1>Terms of Use</h1>
      <p>Gemshi's apps use Apple's Standard End User License Agreement (EULA).</p>
      <p>This is the default legal agreement applied to apps distributed on the App Store unless a custom agreement is provided.</p>
      <a class="btn" href="https://www.apple.com/legal/internet-services/itunes/dev/stdeula/" target="_blank" rel="noopener noreferrer">Open Apple Standard EULA</a>
    </section>
  </div>
  <script>
    const root = document.documentElement;
    const btn = document.getElementById("theme-toggle");
    const themeIcon = document.getElementById("theme-icon");
    const themeText = document.getElementById("theme-text");
    const storageKey = "gemshi-theme";
    function applyTheme(theme) {
      root.setAttribute("data-theme", theme);
      const isLight = theme === "light";
      if (themeText) themeText.textContent = isLight ? "Light" : "Dark";
      if (themeIcon) themeIcon.textContent = isLight ? "☀" : "☾";
    }
    const stored = localStorage.getItem(storageKey);
    const prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
    applyTheme(stored || (prefersLight ? "light" : "dark"));
    btn.addEventListener("click", function () {
      const next = root.getAttribute("data-theme") === "light" ? "dark" : "light";
      applyTheme(next);
      localStorage.setItem(storageKey, next);
    });
  </script>
</body>
</html>
